name: Bug report
description: Report a reproducible bug in these dotfiles.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve this personal dotfiles repo.
        Bug reports are welcome here, but feature requests are not accepted.
        If you want a different setup or feature, please fork the repo and make it yours.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the behavior you saw.
      placeholder: Tell me what broke or behaved unexpectedly.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: What did you expect to happen?
      description: Describe the behavior you expected.
      placeholder: Tell me what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro-steps
    attributes:
      label: Reproduction steps
      description: List the smallest set of steps that reproduces the bug.
      placeholder: |
        1. Clone the repo.
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did you see the bug?
      multiple: true
      options:
        - macOS
        - Linux
        - WSL
        - Other
    validations:
      required: true
  - type: input
    id: nix-generation
    attributes:
      label: Nix or home-manager generation
      description: If relevant, include the Nix, nix-darwin, or home-manager generation involved.
      placeholder: "Example: nix-darwin generation 42, home-manager generation 17"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any relevant error output.
      render: shell
    validations:
      required: false
